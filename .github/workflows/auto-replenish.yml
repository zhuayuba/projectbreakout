name: 自动补货
on:
  schedule:
    # UTC 18:00 = 北京时间 02:00 凌晨
    # 避开 20:00 推送高峰, 凌晨 DeepSeek 负载低
    - cron: "0 18 * * *"
  workflow_dispatch:
    inputs:
      series:
        description: "指定系列 (留空则检查全部: stones/thinking/career)"
        type: choice
        options:
          - ""
          - stones
          - thinking
          - career
      count:
        description: "每个系列生成几期 (默认6)"
        default: "6"

permissions:
  contents: write

jobs:
  replenish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 检查库存并补货
        id: run
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          SERIES_INPUT="${{ github.event.inputs.series }}"
          COUNT="${{ github.event.inputs.count }}"

          # 决定要处理哪些系列
          if [ -z "$SERIES_INPUT" ]; then
            SERIES_LIST="stones thinking career"
          else
            SERIES_LIST="$SERIES_INPUT"
          fi

          echo "处理系列: $SERIES_LIST"
          echo "每系列生成: ${COUNT:-6} 期"

          ANY_GENERATED=0
          ANY_FAILED=0
          # 用临时文件存多行 summary, 避免多行变量在 Actions 里的坑
          SUMMARY_FILE=$(mktemp)

          for s in $SERIES_LIST; do
            echo "=========================================="
            echo "处理系列: $s"
            echo "=========================================="

            # 先检查库存, 决定是否需要补货
            TOTAL=$(ls $s/[0-9][0-9].html 2>/dev/null | wc -l)
            NEXT=$(cat $s/next_issue.txt 2>/dev/null || echo "1")
            RESERVE=$((TOTAL - NEXT + 1))
            echo "$s 库存: $RESERVE 期 (TOTAL=$TOTAL NEXT=$NEXT)"

            if [ "$RESERVE" -gt 2 ]; then
              echo "$s 库存充足, 跳过"
              echo "$s: 库存 $RESERVE 期, 跳过" >> "$SUMMARY_FILE"
              continue
            fi

            # 库存 ≤2, 调脚本补货 (脚本退出码: 0=成功或无生成, 1=有错误)
            set +e
            python3 scripts/replenish.py "$s" --count "${COUNT:-6}" > /tmp/replenish_$s.log 2>&1
            SCRIPT_EXIT=$?
            set -e
            cat /tmp/replenish_$s.log

            # 检查是否真的生成了新文件 (git status)
            NEW_FILES=$(git status --porcelain -- "$s/[0-9][0-9].html" | grep "^??" | wc -l | tr -d ' ')
            if [ "$NEW_FILES" -gt 0 ]; then
              echo "$s 生成了 $NEW_FILES 个新文件"
              ANY_GENERATED=1
              echo "$s: ✅ 生成 $NEW_FILES 期" >> "$SUMMARY_FILE"
            elif [ "$SCRIPT_EXIT" -ne 0 ]; then
              # 脚本报错且没生成 = 真失败
              echo "$s: ❌ 补货失败 (脚本退出码 $SCRIPT_EXIT, 见日志)" >> "$SUMMARY_FILE"
              ANY_FAILED=1
            else
              # 脚本正常退出但没生成 (选题池空等)
              echo "$s: ⚠️ 库存低但未生成 (选题池空?)" >> "$SUMMARY_FILE"
              ANY_FAILED=1
            fi
          done

          echo "=========================================="
          echo "汇总:"
          cat "$SUMMARY_FILE"
          echo "=========================================="

          # 保存汇总给后续步骤用 (用文件避免多行变量问题)
          echo "any_generated=$ANY_GENERATED" >> $GITHUB_OUTPUT
          echo "any_failed=$ANY_FAILED" >> $GITHUB_OUTPUT
          {
            echo "summary<<SUMMARY_EOF"
            cat "$SUMMARY_FILE"
            echo "SUMMARY_EOF"
          } >> $GITHUB_OUTPUT

      - name: 提交补货内容
        if: steps.run.outputs.any_generated == '1'
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add stones/ thinking/ career/
          git diff --staged --quiet || {
            git commit -m "🤖 自动补货 ($(date -u '+%Y-%m-%d'))"
            git push
            echo "已提交补货内容"
          }

      - name: 失败告警 (飞书)
        if: steps.run.outputs.any_failed == '1'
        env:
          LARK_WEBHOOK_URL: ${{ secrets.LARK_WEBHOOK_URL }}
          LARK_SIGNING_SECRET: ${{ secrets.LARK_SIGNING_SECRET }}
          ALERT_SUMMARY: ${{ steps.run.outputs.summary }}
        run: |
          python3 scripts/notify_lark.py \
            "⚠️ 破茧计划 · 自动补货告警" \
            "$ALERT_SUMMARY"
